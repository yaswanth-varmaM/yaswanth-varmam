<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
  <defs>
    <linearGradient id="strapGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b9d;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#9c27b0;stop-opacity:1"/>
    </linearGradient>
    
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:0.95"/>
    </linearGradient>
    
    <linearGradient id="holoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0);stop-opacity:1"/>
      <stop offset="50%" style="stop-color:rgba(255,255,255,0.3);stop-opacity:1"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0);stop-opacity:1"/>
    </linearGradient>
    
    <filter id="glowRing">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Group with pendulum animation -->
  <g transform="translate(200, 0)">
    <animateTransform attributeName="transform" type="rotate" values="-5;5;-3;3;0" dur="3s" repeatCount="indefinite" begin="0.5s"/>
    
    <!-- Strap -->
    <rect x="-30" y="0" width="60" height="150" fill="url(#strapGradient)" rx="5"/>
    <text x="0" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white" transform="rotate(-90, 0, 80)">
      YASWANTH VARMA
    </text>
    
    <!-- Metal Clasp -->
    <rect x="-25" y="150" width="50" height="20" fill="#888" rx="3"/>
    <rect x="-20" y="155" width="40" height="10" fill="#aaa"/>
    
    <!-- Metal Ring -->
    <circle cx="0" cy="180" r="12" fill="none" stroke="#silver" stroke-width="4"/>
    
    <!-- ID Card -->
    <g transform="translate(0, 200)">
      <!-- Card Background -->
      <rect x="-120" y="0" width="240" height="320" fill="url(#cardGradient)" rx="15" stroke="#ff6b9d" stroke-width="2"/>
      
      <!-- Holographic Shine -->
      <rect x="-120" y="0" width="240" height="320" fill="url(#holoGradient)" rx="15" opacity="0">
        <animate attributeName="opacity" values="0;0.5;0" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="x" values="-120;320;-120" dur="3s" repeatCount="indefinite"/>
      </rect>
      
      <!-- Avatar Ring -->
      <circle cx="0" cy="70" r="55" fill="none" stroke="#ff6b9d" stroke-width="3" filter="url(#glowRing)">
        <animate attributeName="stroke" values="#ff6b9d;#9c27b0;#ff6b9d" dur="3s" repeatCount="indefinite"/>
      </circle>
      
      <!-- Avatar Placeholder (Replace with actual image) -->
      <circle cx="0" cy="70" r="50" fill="#2d3436">
        <clipPath id="avatarClip">
          <circle cx="0" cy="70" r="50"/>
        </clipPath>
      </circle>
      <text x="0" y="75" text-anchor="middle" font-size="40" fill="#ff6b9d" clip-path="url(#avatarClip)">YM</text>
      
      <!-- Name -->
      <text x="0" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">
        Malaraju Yaswanth Varma
      </text>
      
      <!-- Role -->
      <text x="0" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#ff6b9d">
        Data Analyst
      </text>
      
      <!-- Handle -->
      <text x="0" y="200" text-anchor="middle" font-family="Courier New, monospace" font-size="12" fill="#a18cd1">
        @yaswanth-varmaM
      </text>
      
      <!-- Barcode -->
      <g transform="translate(-80, 240)">
        <rect x="0" y="0" width="3" height="30" fill="#fff"/>
        <rect x="5" y="0" width="2" height="30" fill="#fff"/>
        <rect x="9" y="0" width="4" height="30" fill="#fff"/>
        <rect x="15" y="0" width="2" height="30" fill="#fff"/>
        <rect x="19" y="0" width="3" height="30" fill="#fff"/>
        <rect x="24" y="0" width="2" height="30" fill="#fff"/>
        <rect x="28" y="0" width="4" height="30" fill="#fff"/>
        <rect x="34" y="0" width="2" height="30" fill="#fff"/>
        <rect x="38" y="0" width="3" height="30" fill="#fff"/>
        <rect x="43" y="0" width="2" height="30" fill="#fff"/>
        <rect x="47" y="0" width="4" height="30" fill="#fff"/>
        <rect x="53" y="0" width="2" height="30" fill="#fff"/>
        <rect x="57" y="0" width="3" height="30" fill="#fff"/>
        <rect x="62" y="0" width="2" height="30" fill="#fff"/>
        <rect x="66" y="0" width="4" height="30" fill="#fff"/>
        <rect x="72" y="0" width="2" height="30" fill="#fff"/>
        <rect x="76" y="0" width="3" height="30" fill="#fff"/>
        <rect x="81" y="0" width="2" height="30" fill="#fff"/>
        <rect x="85" y="0" width="4" height="30" fill="#fff"/>
        <rect x="91" y="0" width="2" height="30" fill="#fff"/>
        <rect x="95" y="0" width="3" height="30" fill="#fff"/>
        <rect x="100" y="0" width="2" height="30" fill="#fff"/>
        <rect x="104" y="0" width="4" height="30" fill="#fff"/>
        <rect x="110" y="0" width="2" height="30" fill="#fff"/>
        <rect x="114" y="0" width="3" height="30" fill="#fff"/>
        <rect x="119" y="0" width="2" height="30" fill="#fff"/>
        <rect x="123" y="0" width="4" height="30" fill="#fff"/>
        <rect x="129" y="0" width="2" height="30" fill="#fff"/>
        <rect x="133" y="0" width="3" height="30" fill="#fff"/>
        <rect x="138" y="0" width="2" height="30" fill="#fff"/>
        <rect x="142" y="0" width="4" height="30" fill="#fff"/>
        <rect x="148" y="0" width="2" height="30" fill="#fff"/>
        <rect x="152" y="0" width="3" height="30" fill="#fff"/>
        <rect x="157" y="0" width="2" height="30" fill="#fff"/>
      </g>
      
      <!-- Email -->
      <text x="0" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">
        yaswanthvarmamalaraju@gmail.com
      </text>
    </g>
  </g>
  
  <!-- Drop-in animation -->
  <animateTransform attributeName="transform" type="translate" values="0,-800;0,0" dur="1s" begin="0s" fill="freeze"/>
</svg>
