<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b9d;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#9c27b0;stop-opacity:1"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="200" fill="transparent"/>
  
  <!-- Rank Ring -->
  <g transform="translate(100, 100)">
    <circle cx="0" cy="0" r="70" fill="none" stroke="#2d3436" stroke-width="10"/>
    <circle cx="0" cy="0" r="70" fill="none" stroke="url(#ringGradient)" stroke-width="10" stroke-dasharray="440" stroke-dashoffset="440" transform="rotate(-90)">
      <animate attributeName="stroke-dashoffset" values="440;110" dur="2s" begin="0.5s" fill="freeze"/>
    </circle>
    <text x="0" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ff6b9d">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="2.5s" fill="freeze"/>
      TOP 5%
    </text>
  </g>
  
  <!-- Stats -->
  <g transform="translate(220, 60)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" fill="#ff6b9d">Followers</text>
    <text x="100" y="0" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="3s" fill="freeze"/>
      <animate attributeName="fill" values="#ffffff;#ff6b9d;#ffffff" dur="2s" begin="3s" repeatCount="indefinite"/>
      100+
    </text>
  </g>
  
  <g transform="translate(220, 100)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" fill="#a18cd1">Contributions</text>
    <text x="120" y="0" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="3.2s" fill="freeze"/>
      500+
    </text>
  </g>
  
  <g transform="translate(220, 140)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" fill="#00ff88">Repositories</text>
    <text x="120" y="0" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="3.4s" fill="freeze"/>
      15+
    </text>
  </g>
</svg>
