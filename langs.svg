<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="transparent"/>
  
  <text x="200" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ff6b9d">Most Used Languages</text>
  
  <!-- Python -->
  <g transform="translate(50, 60)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">Python</text>
    <rect x="0" y="10" width="300" height="20" fill="#2d3436" rx="5"/>
    <rect x="0" y="10" width="0" height="20" fill="#3776ab" rx="5">
      <animate attributeName="width" values="0;270" dur="1.5s" begin="0.5s" fill="freeze"/>
    </rect>
    <text x="280" y="24" font-family="Arial, sans-serif" font-size="12" fill="#3776ab">90%</text>
  </g>
  
  <!-- SQL -->
  <g transform="translate(50, 100)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">SQL</text>
    <rect x="0" y="10" width="300" height="20" fill="#2d3436" rx="5"/>
    <rect x="0" y="10" width="0" height="20" fill="#00758f" rx="5">
      <animate attributeName="width" values="0;240" dur="1.5s" begin="0.7s" fill="freeze"/>
    </rect>
    <text x="250" y="24" font-family="Arial, sans-serif" font-size="12" fill="#00758f">80%</text>
  </g>
  
  <!-- Excel -->
  <g transform="translate(50, 140)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">Excel</text>
    <rect x="0" y="10" width="300" height="20" fill="#2d3436" rx="5"/>
    <rect x="0" y="10" width="0" height="20" fill="#217346" rx="5">
      <animate attributeName="width" values="0;225" dur="1.5s" begin="0.9s" fill="freeze"/>
    </rect>
    <text x="235" y="24" font-family="Arial, sans-serif" font-size="12" fill="#217346">75%</text>
  </g>
  
  <!-- Power BI -->
  <g transform="translate(50, 180)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">Power BI</text>
    <rect x="0" y="10" width="300" height="20" fill="#2d3436" rx="5"/>
    <rect x="0" y="10" width="0" height="20" fill="#f2c811" rx="5">
      <animate attributeName="width" values="0;210" dur="1.5s" begin="1.1s" fill="freeze"/>
    </rect>
    <text x="220" y="24" font-family="Arial, sans-serif" font-size="12" fill="#f2c811">70%</text>
  </g>
  
  <!-- Tableau -->
  <g transform="translate(50, 220)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">Tableau</text>
    <rect x="0" y="10" width="300" height="20" fill="#2d3436" rx="5"/>
    <rect x="0" y="10" width="0" height="20" fill="#e97627" rx="5">
      <animate attributeName="width" values="0;195" dur="1.5s" begin="1.3s" fill="freeze"/>
    </rect>
    <text x="205" y="24" font-family="Arial, sans-serif" font-size="12" fill="#e97627">65%</text>
  </g>
  
  <!-- JavaScript -->
  <g transform="translate(50, 260)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">JavaScript</text>
    <rect x="0" y="10" width="300" height="20" fill="#2d3436" rx="5"/>
    <rect x="0" y="10" width="0" height="20" fill="#f7df1e" rx="5">
      <animate attributeName="width" values="0;180" dur="1.5s" begin="1.5s" fill="freeze"/>
    </rect>
    <text x="190" y="24" font-family="Arial, sans-serif" font-size="12" fill="#f7df1e">60%</text>
  </g>
</svg>
