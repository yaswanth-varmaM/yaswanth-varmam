<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <filter id="langGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="400" height="240" rx="12" fill="#1a1a2e" filter="url(#langGlow)"/>
  <text x="200" y="30" text-anchor="middle" fill="#FFFFFF" font-family="Arial" font-size="18" font-weight="bold">Top Programming Languages</text>
  
  <!-- Python Bar -->
  <g transform="translate(30, 60)">
    <rect x="0" y="0" width="340" height="28" rx="6" fill="#2d2d44"/>
    <rect x="0" y="0" width="0" height="28" rx="6" fill="#3776AB" opacity="0">
      <animate attributeName="width" from="0" to="153" dur="1.5s" begin="0.5s" fill="freeze"/>
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.5s" fill="freeze"/>
    </rect>
    <text x="10" y="18" fill="#FFFFFF" font-family="Arial" font-size="13" font-weight="bold" opacity="0">
      Python
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2s" fill="freeze"/>
    </text>
    <text x="330" y="18" text-anchor="end" fill="#FFFFFF" font-family="Arial" font-size="13" font-weight="bold" opacity="0">
      45%
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2s" fill="freeze"/>
    </text>
  </g>
  
  <!-- SQL Bar -->
  <g transform="translate(30, 100)">
    <rect x="0" y="0" width="340" height="28" rx="6" fill="#2d2d44"/>
    <rect x="0" y="0" width="0" height="28" rx="6" fill="#00758F" opacity="0">
      <animate attributeName="width" from="0" to="85" dur="1.5s" begin="0.8s" fill="freeze"/>
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.8s" fill="freeze"/>
    </rect>
    <text x="10" y="18" fill="#FFFFFF" font-family="Arial" font-size="13" font-weight="bold" opacity="0">
      SQL
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.3s" fill="freeze"/>
    </text>
    <text x="330" y="18" text-anchor="end" fill="#FFFFFF" font-family="Arial" font-size="13" font-weight="bold" opacity="0">
      25%
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.3s" fill="freeze"/>
    </text>
  </g>
  
  <!-- JavaScript Bar -->
  <g transform="translate(30, 140)">
    <rect x="0" y="0" width="340" height="28" rx="6" fill="#2d2d44"/>
    <rect x="0" y="0" width="0" height="28" rx="6" fill="#F7DF1E" opacity="0">
      <animate attributeName="width" from="0" to="51" dur="1.5s" begin="1.1s" fill="freeze"/>
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.1s" fill="freeze"/>
    </rect>
    <text x="10" y="18" fill="#000000" font-family="Arial" font-size="13" font-weight="bold" opacity="0">
      JavaScript
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.6s" fill="freeze"/>
    </text>
    <text x="330" y="18" text-anchor="end" fill="#FFFFFF" font-family="Arial" font-size="13" font-weight="bold" opacity="0">
      15%
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.6s" fill="freeze"/>
    </text>
  </g>
  
  <!-- HTML Bar -->
  <g transform="translate(30, 180)">
    <rect x="0" y="0" width="340" height="28" rx="6" fill="#2d2d44"/>
    <rect x="0" y="0" width="0" height="28" rx="6" fill="#E34F26" opacity="0">
      <animate attributeName="width" from="0" to="34" dur="1.5s" begin="1.4s" fill="freeze"/>
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.4s" fill="freeze"/>
    </rect>
    <text x="10" y="18" fill="#FFFFFF" font-family="Arial" font-size="13" font-weight="bold" opacity="0">
      HTML
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.9s" fill="freeze"/>
    </text>
    <text x="330" y="18" text-anchor="end" fill="#FFFFFF" font-family="Arial" font-size="13" font-weight="bold" opacity="0">
      10%
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.9s" fill="freeze"/>
    </text>
  </g>
  
  <!-- CSS Bar -->
  <g transform="translate(30, 215)">
    <rect x="0" y="0" width="340" height="20" rx="6" fill="#2d2d44"/>
    <rect x="0" y="0" width="0" height="20" rx="6" fill="#1572B6" opacity="0">
      <animate attributeName="width" from="0" to="17" dur="1.5s" begin="1.7s" fill="freeze"/>
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.7s" fill="freeze"/>
    </rect>
    <text x="10" y="14" fill="#FFFFFF" font-family="Arial" font-size="11" font-weight="bold" opacity="0">
      CSS
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="3.2s" fill="freeze"/>
    </text>
    <text x="330" y="14" text-anchor="end" fill="#FFFFFF" font-family="Arial" font-size="11" font-weight="bold" opacity="0">
      5%
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="3.2s" fill="freeze"/>
    </text>
  </g>
</svg>
