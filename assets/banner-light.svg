<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1280 740">
  <defs>
    <linearGradient id="lightGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#F0F0F5;stop-opacity:1"/>
    </linearGradient>
    
    <linearGradient id="nameGradientLight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF1493;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#C71585;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#8B008B;stop-opacity:1"/>
    </linearGradient>
    
    <filter id="glowLight">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <clipPath id="roundedCornersLight">
      <rect x="0" y="0" width="1280" height="740" rx="20" ry="20"/>
    </clipPath>
  </defs>
  
  <rect width="1280" height="740" fill="url(#lightGradient)" clip-path="url(#roundedCornersLight)"/>
  
  <!-- Subtle Ambient Orbs -->
  <circle cx="200" cy="150" r="100" fill="rgba(255,20,147,0.05)" filter="url(#glowLight)">
    <animate attributeName="r" values="100;120;100" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1000" cy="500" r="80" fill="rgba(139,0,139,0.05)" filter="url(#glowLight)">
    <animate attributeName="r" values="80;100;80" dur="5s" repeatCount="indefinite" begin="1s"/>
  </circle>
  
  <!-- Terminal -->
  <rect x="50" y="50" width="500" height="80" rx="10" fill="rgba(240,240,245,0.8)" stroke="#E0E0E0" stroke-width="1"/>
  <text x="70" y="90" fill="#00AA00" font-family="monospace" font-size="18">user@dev:~$ cat</text>
  <text x="70" y="120" fill="#333333" font-family="monospace" font-size="16">Malaraju Yaswanth Varma</text>
  <rect x="180" y="100" width="10" height="20" fill="#00AA00">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Name -->
  <text x="640" y="280" text-anchor="middle" fill="url(#nameGradientLight)" font-family="cursive" font-size="72" font-weight="bold" filter="url(#glowLight)">
    Malaraju Yaswanth Varma
  </text>
  
  <!-- Role -->
  <text x="640" y="340" text-anchor="middle" fill="#555555" font-family="Arial" font-size="28">
    <tspan>
      Data Analyst
      <animate attributeName="opacity" values="1;0;0;1;1;0;0;1" dur="8s" repeatCount="indefinite"/>
    </tspan>
    <tspan>
      Python Developer
      <animate attributeName="opacity" values="0;1;1;0;0;1;1;0" dur="8s" repeatCount="indefinite"/>
    </tspan>
  </text>
  
  <!-- Quote Box -->
  <rect x="440" y="370" width="400" height="60" rx="10" fill="rgba(255,255,255,0.9)" stroke="#FF1493" stroke-width="2"/>
  <text x="640" y="405" text-anchor="middle" fill="#8B008B" font-family="monospace" font-size="18">"Zero dependencies. Zero regrets."</text>
  
  <!-- Tech Stack -->
  <g transform="translate(340, 470)">
    <rect x="0" y="0" width="100" height="35" rx="17.5" fill="#3776AB"/>
    <text x="50" y="23" text-anchor="middle" fill="#FFFFFF" font-family="Arial" font-size="14" font-weight="bold">Python</text>
    
    <rect x="120" y="0" width="70" height="35" rx="17.5" fill="#00758F"/>
    <text x="155" y="23" text-anchor="middle" fill="#FFFFFF" font-family="Arial" font-size="14" font-weight="bold">SQL</text>
    
    <rect x="210" y="0" width="80" height="35" rx="17.5" fill="#217346"/>
    <text x="250" y="23" text-anchor="middle" fill="#FFFFFF" font-family="Arial" font-size="14" font-weight="bold">Excel</text>
    
    <rect x="310" y="0" width="100" height="35" rx="17.5" fill="#F2C811"/>
    <text x="360" y="23" text-anchor="middle" fill="#000000" font-family="Arial" font-size="14" font-weight="bold">Power BI</text>
    
    <rect x="430" y="0" width="90" height="35" rx="17.5" fill="#E97627"/>
    <text x="475" y="23" text-anchor="middle" fill="#FFFFFF" font-family="Arial" font-size="14" font-weight="bold">Tableau</text>
    
    <rect x="540" y="0" width="70" height="35" rx="17.5" fill="#E34F26"/>
    <text x="575" y="23" text-anchor="middle" fill="#FFFFFF" font-family="Arial" font-size="14" font-weight="bold">HTML</text>
    
    <rect x="630" y="0" width="60" height="35" rx="17.5" fill="#1572B6"/>
    <text x="660" y="23" text-anchor="middle" fill="#FFFFFF" font-family="Arial" font-size="14" font-weight="bold">CSS</text>
    
    <rect x="710" y="0" width="110" height="35" rx="17.5" fill="#F7DF1E"/>
    <text x="765" y="23" text-anchor="middle" fill="#000000" font-family="Arial" font-size="14" font-weight="bold">JavaScript</text>
  </g>
  
  <!-- Code Editor -->
  <rect x="50" y="530" width="400" height="180" rx="10" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="50" y="530" width="400" height="30" rx="10" fill="#F5F5F5"/>
  <circle cx="70" cy="545" r="6" fill="#FF5F56"/>
  <circle cx="90" cy="545" r="6" fill="#FFBD2E"/>
  <circle cx="110" cy="545" r="6" fill="#27C93F"/>
  <text x="80" y="550" fill="#666666" font-family="monospace" font-size="12">buildDreams.jsx</text>
  
  <text x="70" y="580" fill="#C71585" font-family="monospace" font-size="14">const buildDreams = () =&gt; {</text>
  <text x="70" y="600" fill="#008B8B" font-family="monospace" font-size="14">  const data = analyze();</text>
  <text x="70" y="620" fill="#008B8B" font-family="monospace" font-size="14">  const insights = visualize(data);</text>
  <text x="70" y="640" fill="#008B8B" font-family="monospace" font-size="14">  return transformToMagic(insights);</text>
  <text x="70" y="660" fill="#C71585" font-family="monospace" font-size="14">};</text>
  
  <!-- Neon Sign (Lighter) -->
  <g transform="translate(700, 580)">
    <rect x="0" y="0" width="350" height="80" rx="10" fill="rgba(255,255,255,0.9)" stroke="#FF1493" stroke-width="2"/>
    <text x="175" y="35" text-anchor="middle" fill="#FF1493" font-family="Arial" font-size="24" font-weight="bold">KEEP CODING</text>
    <text x="175" y="65" text-anchor="middle" fill="#8B008B" font-family="Arial" font-size="24" font-weight="bold">KEEP GROWING</text>
  </g>
  
  <!-- Scanner -->
  <rect x="0" y="0" width="1280" height="2" fill="rgba(255,20,147,0.4)">
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,740" dur="3.5s" repeatCount="indefinite"/>
  </rect>
</svg>
