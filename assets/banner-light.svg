<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 740">
  <defs>
    <!-- Professional Palette -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8F9FA;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#E9ECEF;stop-opacity:1"/>
    </linearGradient>
    
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4361EE;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3A0CA3;stop-opacity:1"/>
    </linearGradient>

    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <clipPath id="roundedCorners">
      <rect x="0" y="0" width="1280" height="740" rx="24" ry="24"/>
    </clipPath>
  </defs>
  
  <!-- Clean Background -->
  <rect width="1280" height="740" fill="url(#bgGradient)" clip-path="url(#roundedCorners)"/>
  
  <!-- Subtle Ambient Orbs (Professional, not messy) -->
  <circle cx="1100" cy="150" r="300" fill="#4361EE" opacity="0.04" filter="url(#softGlow)"/>
  <circle cx="150" cy="600" r="250" fill="#4361EE" opacity="0.04" filter="url(#softGlow)"/>
  
  <!-- Top Left: Sleek Terminal Intro -->
  <g transform="translate(60, 60)">
    <rect x="0" y="0" width="340" height="70" rx="12" fill="#FFFFFF" stroke="#E9ECEF" stroke-width="1" filter="url(#softGlow)"/>
    <circle cx="24" cy="35" r="6" fill="#FF5F56"/>
    <circle cx="44" cy="35" r="6" fill="#FFBD2E"/>
    <circle cx="64" cy="35" r="6" fill="#27C93F"/>
    <text x="90" y="40" fill="#12141D" font-family="monospace" font-size="14" font-weight="500">user@portfolio:~$ cat intro.txt</text>
  </g>

  <!-- Center: Name and Role -->
  <g transform="translate(640, 260)" text-anchor="middle">
    <!-- Name -->
    <text x="0" y="0" fill="#12141D" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="64" font-weight="800" letter-spacing="-1">
      Malaraju Yaswanth Varma
    </text>
    
    <!-- Role with subtle fade animation -->
    <text x="0" y="50" fill="#4361EE" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="600" letter-spacing="3">
      <tspan opacity="1">
        DATA ANALYST
        <animate attributeName="opacity" values="1;0;0;1;1;0;0;1" dur="8s" repeatCount="indefinite"/>
      </tspan>
      <tspan x="0" dy="0" opacity="0">
        PYTHON DEVELOPER
        <animate attributeName="opacity" values="0;1;1;0;0;1;1;0" dur="8s" repeatCount="indefinite"/>
      </tspan>
      <tspan x="0" dy="0" opacity="0">
        BI ENTHUSIAST
        <animate attributeName="opacity" values="0;0;1;1;0;0;1;1" dur="8s" repeatCount="indefinite"/>
      </tspan>
    </text>
    
    <!-- Decorative Line -->
    <rect x="-60" y="80" width="120" height="4" rx="2" fill="url(#accentGradient)">
      <animate attributeName="width" values="0;120" dur="1.5s" fill="freeze"/>
    </rect>
  </g>

  <!-- Tech Stack Pills (Clean, unified with the new palette) -->
  <g transform="translate(250, 400)">
    <!-- Python -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="110" height="40" rx="20" fill="#12141D" opacity="0.03"/>
      <rect x="0" y="0" width="110" height="40" rx="20" fill="none" stroke="#4361EE" stroke-width="2"/>
      <text x="55" y="25" text-anchor="middle" fill="#12141D" font-family="system-ui, sans-serif" font-size="14" font-weight="700">Python</text>
    </g>
    <!-- SQL -->
    <g transform="translate(130, 0)">
      <rect x="0" y="0" width="80" height="40" rx="20" fill="#12141D" opacity="0.03"/>
      <rect x="0" y="0" width="80" height="40" rx="20" fill="none" stroke="#4361EE" stroke-width="2"/>
      <text x="40" y="25" text-anchor="middle" fill="#12141D" font-family="system-ui, sans-serif" font-size="14" font-weight="700">SQL</text>
    </g>
    <!-- Excel -->
    <g transform="translate(230, 0)">
      <rect x="0" y="0" width="90" height="40" rx="20" fill="#12141D" opacity="0.03"/>
      <rect x="0" y="0" width="90" height="40" rx="20" fill="none" stroke="#4361EE" stroke-width="2"/>
      <text x="45" y="25" text-anchor="middle" fill="#12141D" font-family="system-ui, sans-serif" font-size="14" font-weight="700">Excel</text>
    </g>
    <!-- Power BI -->
    <g transform="translate(340, 0)">
      <rect x="0" y="0" width="110" height="40" rx="20" fill="#12141D" opacity="0.03"/>
      <rect x="0" y="0" width="110" height="40" rx="20" fill="none" stroke="#4361EE" stroke-width="2"/>
      <text x="55" y="25" text-anchor="middle" fill="#12141D" font-family="system-ui, sans-serif" font-size="14" font-weight="700">Power BI</text>
    </g>
    <!-- Tableau -->
    <g transform="translate(470, 0)">
      <rect x="0" y="0" width="100" height="40" rx="20" fill="#12141D" opacity="0.03"/>
      <rect x="0" y="0" width="100" height="40" rx="20" fill="none" stroke="#4361EE" stroke-width="2"/>
      <text x="50" y="25" text-anchor="middle" fill="#12141D" font-family="system-ui, sans-serif" font-size="14" font-weight="700">Tableau</text>
    </g>
    <!-- HTML -->
    <g transform="translate(590, 0)">
      <rect x="0" y="0" width="90" height="40" rx="20" fill="#12141D" opacity="0.03"/>
      <rect x="0" y="0" width="90" height="40" rx="20" fill="none" stroke="#4361EE" stroke-width="2"/>
      <text x="45" y="25" text-anchor="middle" fill="#12141D" font-family="system-ui, sans-serif" font-size="14" font-weight="700">HTML</text>
    </g>
    <!-- CSS -->
    <g transform="translate(700, 0)">
      <rect x="0" y="0" width="80" height="40" rx="20" fill="#12141D" opacity="0.03"/>
      <rect x="0" y="0" width="80" height="40" rx="20" fill="none" stroke="#4361EE" stroke-width="2"/>
      <text x="40" y="25" text-anchor="middle" fill="#12141D" font-family="system-ui, sans-serif" font-size="14" font-weight="700">CSS</text>
    </g>
    <!-- JS -->
    <g transform="translate(800, 0)">
      <rect x="0" y="0" width="130" height="40" rx="20" fill="#12141D" opacity="0.03"/>
      <rect x="0" y="0" width="130" height="40" rx="20" fill="none" stroke="#4361EE" stroke-width="2"/>
      <text x="65" y="25" text-anchor="middle" fill="#12141D" font-family="system-ui, sans-serif" font-size="14" font-weight="700">JavaScript</text>
    </g>
  </g>

  <!-- Bottom Left: Clean Code Editor Card -->
  <g transform="translate(60, 500)">
    <rect x="0" y="0" width="440" height="180" rx="16" fill="#12141D" filter="url(#softGlow)"/>
    <!-- Window Controls -->
    <rect x="0" y="0" width="440" height="36" rx="16" fill="#1A1D26"/>
    <rect x="0" y="18" width="440" height="18" fill="#1A1D26"/>
    <circle cx="24" cy="18" r="6" fill="#FF5F56"/>
    <circle cx="44" cy="18" r="6" fill="#FFBD2E"/>
    <circle cx="64" cy="18" r="6" fill="#27C93F"/>
    <text x="90" y="23" fill="#F8F9FA" font-family="monospace" font-size="12" opacity="0.7">buildDreams.jsx</text>
    
    <!-- Code Content -->
    <text x="24" y="65" fill="#4361EE" font-family="monospace" font-size="14" font-weight="bold">const</text>
    <text x="74" y="65" fill="#F8F9FA" font-family="monospace" font-size="14"> buildDreams = () =&gt; {</text>
    
    <text x="24" y="95" fill="#F8F9FA" font-family="monospace" font-size="14">  </text>
    <text x="48" y="95" fill="#4361EE" font-family="monospace" font-size="14" font-weight="bold">const</text>
    <text x="98" y="95" fill="#F8F9FA" font-family="monospace" font-size="14"> data = </text>
    <text x="154" y="95" fill="#4CC9F0" font-family="monospace" font-size="14">analyze()</text>
    <text x="224" y="95" fill="#F8F9FA" font-family="monospace" font-size="14">;</text>
    
    <text x="24" y="125" fill="#F8F9FA" font-family="monospace" font-size="14">  </text>
    <text x="48" y="125" fill="#4361EE" font-family="monospace" font-size="14" font-weight="bold">const</text>
    <text x="98" y="125" fill="#F8F9FA" font-family="monospace" font-size="14"> insights = </text>
    <text x="196" y="125" fill="#4CC9F0" font-family="monospace" font-size="14">visualize</text>
    <text x="266" y="125" fill="#F8F9FA" font-family="monospace" font-size="14">(data);</text>
    
    <text x="24" y="155" fill="#F8F9FA" font-family="monospace" font-size="14">  </text>
    <text x="48" y="155" fill="#4361EE" font-family="monospace" font-size="14" font-weight="bold">return</text>
    <text x="106" y="155" fill="#4CC9F0" font-family="monospace" font-size="14"> transformToMagic</text>
    <text x="252" y="155" fill="#F8F9FA" font-family="monospace" font-size="14">(insights);</text>
    
    <text x="24" y="185" fill="#F8F9FA" font-family="monospace" font-size="14">};</text>
  </g>

  <!-- Bottom Right: Professional Motto / Status Card -->
  <g transform="translate(780, 500)">
    <rect x="0" y="0" width="440" height="180" rx="16" fill="#FFFFFF" stroke="#E9ECEF" stroke-width="1" filter="url(#softGlow)"/>
    
    <!-- Icon -->
    <circle cx="60" cy="60" r="30" fill="#4361EE" opacity="0.1"/>
    <path d="M 45 60 L 55 70 L 75 50" fill="none" stroke="#4361EE" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    
    <text x="110" y="50" fill="#12141D" font-family="system-ui, sans-serif" font-size="20" font-weight="700">Zero dependencies.</text>
    <text x="110" y="75" fill="#4361EE" font-family="system-ui, sans-serif" font-size="20" font-weight="700">Zero regrets.</text>
    
    <!-- Divider -->
    <line x1="30" y1="110" x2="410" y2="110" stroke="#E9ECEF" stroke-width="1"/>
    
    <!-- Availability Status -->
    <text x="30" y="140" fill="#12141D" font-family="system-ui, sans-serif" font-size="14" font-weight="600" opacity="0.6">AVAILABLE FOR HIRE</text>
    <circle cx="215" cy="136" r="4" fill="#27C93F">
      <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
