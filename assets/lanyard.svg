<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 550" width="300" height="550">
  <defs>
    <!-- Gradients -->
    <linearGradient id="strapGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b9d" />
      <stop offset="100%" stop-color="#9c27b0" />
    </linearGradient>
    
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#16213e" stop-opacity="0.98" />
    </linearGradient>
    
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e0e0e0" />
      <stop offset="50%" stop-color="#9e9e9e" />
      <stop offset="100%" stop-color="#616161" />
    </linearGradient>

    <linearGradient id="holoShine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(255,255,255,0)" />
      <stop offset="50%" stop-color="rgba(255,255,255,0.4)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0)" />
    </linearGradient>

    <!-- Glow Filter for Avatar Ring -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Clip Path for Avatar -->
    <clipPath id="avatarClip">
      <circle cx="150" cy="260" r="38" />
    </clipPath>

    <style>
      /* Drop-in and Pendulum Swing Animation */
      .lanyard-swing {
        transform-origin: 150px 0px;
        animation: dropAndSway 4s ease-out forwards;
      }
      
      @keyframes dropAndSway {
        0% { transform: translateY(-600px) rotate(-15deg); }
        40% { transform: translateY(0px) rotate(10deg); }
        60% { transform: translateY(0px) rotate(-6deg); }
        80% { transform: translateY(0px) rotate(3deg); }
        100% { transform: translateY(0px) rotate(0deg); }
      }

      /* Continuous Gentle Sway after drop-in */
      .lanyard-sway {
        transform-origin: 150px 0px;
        animation: gentleSway 5s ease-in-out infinite alternate;
        animation-delay: 4s; /* Starts after the drop-in finishes */
      }

      @keyframes gentleSway {
        0% { transform: rotate(-3deg); }
        100% { transform: rotate(3deg); }
      }

      /* Holographic Shine Sweep */
      .holo-shine {
        animation: shineSweep 3.5s linear infinite;
      }

      @keyframes shineSweep {
        0% { transform: translateX(-150px) skewX(-20deg); }
        100% { transform: translateX(350px) skewX(-20deg); }
      }

      /* Text Styles */
      .text-name { font-family: 'Segoe UI', Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #ffffff; text-anchor: middle; }
      .text-role { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; font-weight: 600; fill: #ff6b9d; text-anchor: middle; }
      .text-handle { font-family: 'Courier New', monospace; font-size: 11px; fill: #a18cd1; text-anchor: middle; }
      .text-email { font-family: 'Segoe UI', Arial, sans-serif; font-size: 9px; fill: #888888; text-anchor: middle; }
      .text-strap { font-family: 'Segoe UI', Arial, sans-serif; font-size: 10px; font-weight: bold; fill: #ffffff; letter-spacing: 2px; }
    </style>
  </defs>

  <!-- Main Animated Group -->
  <g class="lanyard-swing">
    <g class="lanyard-sway">
      
      <!-- Lanyard Strap -->
      <rect x="130" y="0" width="40" height="160" rx="5" fill="url(#strapGrad)" />
      <text x="150" y="80" class="text-strap" transform="rotate(90, 150, 80)">YASWANTH VARMA</text>

      <!-- Metal Clasp -->
      <rect x="120" y="155" width="60" height="18" rx="4" fill="url(#metalGrad)" />
      <rect x="125" y="158" width="50" height="12" rx="2" fill="#444" />

      <!-- Metal Ring -->
      <circle cx="150" cy="185" r="14" fill="none" stroke="url(#metalGrad)" stroke-width="4" />
      <circle cx="150" cy="185" r="10" fill="none" stroke="#222" stroke-width="2" />

      <!-- ID Card Background -->
      <rect x="50" y="210" width="200" height="290" rx="15" fill="url(#cardGrad)" stroke="#ff6b9d" stroke-width="2" />

      <!-- Holographic Shine Effect (Clipped to Card) -->
      <g clip-path="url(#cardClip)">
        <clipPath id="cardClip">
          <rect x="50" y="210" width="200" height="290" rx="15" />
        </clipPath>
        <rect x="0" y="210" width="60" height="290" fill="url(#holoShine)" class="holo-shine" />
      </g>

      <!-- Glowing Avatar Ring -->
      <circle cx="150" cy="265" r="42" fill="none" stroke="#ff6b9d" stroke-width="3" filter="url(#glow)">
        <animate attributeName="stroke" values="#ff6b9d;#9c27b0;#ff6b9d" dur="3s" repeatCount="indefinite" />
      </circle>
      <circle cx="150" cy="265" r="38" fill="#2d3436" />

      <!-- 
        ==========================================
        AVATAR IMAGE GOES HERE!
        To add your actual face, replace the <g> below with:
        <image href="data:image/png;base64,YOUR_BASE64_CODE_HERE" 
               x="112" y="227" width="76" height="76" 
               clip-path="url(#avatarClip)" />
        ==========================================
      -->
      <!-- Placeholder Avatar (Initials) -->
      <g clip-path="url(#avatarClip)">
        <rect x="112" y="227" width="76" height="76" fill="#1a1a2e" />
        <text x="150" y="272" font-family="Arial" font-size="22" font-weight="bold" fill="#ff6b9d" text-anchor="middle">MYV</text>
      </g>

      <!-- Card Text Details -->
      <text x="150" y="335" class="text-name">Malaraju Yaswanth Varma</text>
      <text x="150" y="355" class="text-role">Data Analyst</text>
      <text x="150" y="375" class="text-handle">@yaswanth-varmaM</text>
      <text x="150" y="395" class="text-email">yaswanthvarmamalaraju@gmail.com</text>

      <!-- Decorative Barcode -->
      <g transform="translate(90, 420)">
        <rect x="0" y="0" width="3" height="25" fill="#fff" />
        <rect x="5" y="0" width="2" height="25" fill="#fff" />
        <rect x="9" y="0" width="4" height="25" fill="#fff" />
        <rect x="15" y="0" width="1" height="25" fill="#fff" />
        <rect x="18" y="0" width="3" height="25" fill="#fff" />
        <rect x="23" y="0" width="2" height="25" fill="#fff" />
        <rect x="27" y="0" width="4" height="25" fill="#fff" />
        <rect x="33" y="0" width="2" height="25" fill="#fff" />
        <rect x="37" y="0" width="3" height="25" fill="#fff" />
        <rect x="42" y="0" width="1" height="25" fill="#fff" />
        <rect x="45" y="0" width="4" height="25" fill="#fff" />
        <rect x="51" y="0" width="2" height="25" fill="#fff" />
        <rect x="55" y="0" width="3" height="25" fill="#fff" />
        <rect x="60" y="0" width="2" height="25" fill="#fff" />
        <rect x="64" y="0" width="4" height="25" fill="#fff" />
        <rect x="70" y="0" width="1" height="25" fill="#fff" />
        <rect x="73" y="0" width="3" height="25" fill="#fff" />
        <rect x="78" y="0" width="2" height="25" fill="#fff" />
        <rect x="82" y="0" width="4" height="25" fill="#fff" />
        <rect x="88" y="0" width="2" height="25" fill="#fff" />
        <rect x="92" y="0" width="3" height="25" fill="#fff" />
        <rect x="97" y="0" width="1" height="25" fill="#fff" />
        <rect x="100" y="0" width="4" height="25" fill="#fff" />
        <rect x="106" y="0" width="2" height="25" fill="#fff" />
        <rect x="110" y="0" width="3" height="25" fill="#fff" />
        <rect x="115" y="0" width="2" height="25" fill="#fff" />
        <rect x="119" y="0" width="1" height="25" fill="#fff" />
      </g>

    </g>
  </g>
</svg>
