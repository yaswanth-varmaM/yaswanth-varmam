<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#FFA500;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="bronzeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#CD7F32;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#8B4513;stop-opacity:1"/>
    </linearGradient>
    <filter id="trophyGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="shineGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0)"/>
      <stop offset="50%" style="stop-color:rgba(255,255,255,0.6)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  
  <rect width="600" height="200" rx="12" fill="#1a1a2e" filter="url(#trophyGlow)"/>
  <text x="300" y="30" text-anchor="middle" fill="#FFFFFF" font-family="Arial" font-size="18" font-weight="bold">GitHub Achievements</text>
  
  <!-- Pull Shark Trophy -->
  <g transform="translate(100, 90)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.5s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" values="0,-20; 100,90" dur="0.5s" begin="0.5s" fill="freeze"/>
    
    <!-- Trophy Icon -->
    <path d="M -25 -30 L 25 -30 L 25 0 Q 25 15 10 20 L 10 30 L -10 30 L -10 20 Q -25 15 -25 0 Z" fill="url(#goldGradient)" filter="url(#trophyGlow)">
      <animate attributeName="fill" values="url(#goldGradient);url(#goldGradient);url(#goldGradient)" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M -35 -20 L -25 -20 L -25 5 Q -35 5 -35 -5 Z" fill="url(#goldGradient)"/>
    <path d="M 25 -20 L 35 -20 L 35 -5 Q 35 5 25 5 Z" fill="url(#goldGradient)"/>
    <rect x="-15" y="30" width="30" height="8" fill="url(#goldGradient)"/>
    <rect x="-20" y="38" width="40" height="6" rx="2" fill="url(#goldGradient)"/>
    
    <!-- Shine Sweep -->
    <path d="M -25 -30 L 25 -30 L 25 0 Q 25 15 10 20 L 10 30 L -10 30 L -10 20 Q -25 15 -25 0 Z" fill="url(#shineGradient)" opacity="0">
      <animate attributeName="opacity" values="0;0.8;0" dur="3s" repeatCount="indefinite" begin="2s"/>
      <animateTransform attributeName="transform" type="translate" values="-30,-30; 60,60" dur="3s" repeatCount="indefinite" begin="2s"/>
    </path>
    
    <text x="0" y="60" text-anchor="middle" fill="#FFD700" font-family="Arial" font-size="12" font-weight="bold">Pull Shark</text>
  </g>
  
  <!-- Starstruck -->
  <g transform="translate(220, 100)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.8s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" values="0,-20; 220,100" dur="0.5s" begin="0.8s" fill="freeze"/>
    
    <path d="M 0 -25 L 6 -8 L 24 -8 L 10 3 L 15 21 L 0 10 L -15 21 L -10 3 L -24 -8 L -6 -8 Z" fill="url(#bronzeGradient)">
      <animate attributeName="fill" values="url(#bronzeGradient);url(#bronzeGradient)" dur="4s" repeatCount="indefinite"/>
    </path>
    
    <text x="0" y="45" text-anchor="middle" fill="#CD7F32" font-family="Arial" font-size="11" font-weight="bold">Starstruck</text>
  </g>
  
  <!-- Quick Draw -->
  <g transform="translate(310, 100)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1.1s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" values="0,-20; 310,100" dur="0.5s" begin="1.1s" fill="freeze"/>
    
    <path d="M -15 -20 L 15 -20 L 5 10 L 15 20 L -5 20 L -15 10 Z" fill="url(#bronzeGradient)"/>
    <rect x="-12" y="-25" width="24" height="5" fill="url(#bronzeGradient)"/>
    
    <text x="0" y="45" text-anchor="middle" fill="#CD7F32" font-family="Arial" font-size="11" font-weight="bold">Quick Draw</text>
  </g>
  
  <!-- Galaxy Brain -->
  <g transform="translate(400, 100)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1.4s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" values="0,-20; 400,100" dur="0.5s" begin="1.4s" fill="freeze"/>
    
    <path d="M 0 -20 Q -15 -10 -15 5 Q -15 20 0 20 Q 15 20 15 5 Q 15 -10 0 -20" fill="url(#bronzeGradient)"/>
    <path d="M -10 -5 Q -5 0 0 -5 Q 5 0 10 -5" fill="none" stroke="#CD7F32" stroke-width="2"/>
    <path d="M -10 5 Q -5 10 0 5 Q 5 10 10 5" fill="none" stroke="#CD7F32" stroke-width="2"/>
    
    <text x="0" y="45" text-anchor="middle" fill="#CD7F32" font-family="Arial" font-size="11" font-weight="bold">Galaxy Brain</text>
  </g>
  
  <!-- Public Sponsor -->
  <g transform="translate(490, 100)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1.7s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" values="0,-20; 490,100" dur="0.5s" begin="1.7s" fill="freeze"/>
    
    <path d="M 0 -20 Q 15 -10 15 5 Q 15 20 0 25 Q -15 20 -15 5 Q -15 -10 0 -20" fill="url(#bronzeGradient)"/>
    
    <text x="0" y="45" text-anchor="middle" fill="#CD7F32" font-family="Arial" font-size="10" font-weight="bold">Public</text>
    <text x="0" y="58" text-anchor="middle" fill="#CD7F32" font-family="Arial" font-size="10" font-weight="bold">Sponsor</text>
  </g>
  
  <!-- YOLO -->
  <g transform="translate(580, 100)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="2s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" values="0,-20; 580,100" dur="0.5s" begin="2s" fill="freeze"/>
    
    <path d="M -10 -15 L 10 -15 L 5 15 L -5 15 Z" fill="url(#bronzeGradient)"/>
    <circle cx="0" cy="-20" r="5" fill="url(#bronzeGradient)"/>
    
    <text x="0" y="45" text-anchor="middle" fill="#CD7F32" font-family="Arial" font-size="11" font-weight="bold">YOLO</text>
  </g>
</svg>
