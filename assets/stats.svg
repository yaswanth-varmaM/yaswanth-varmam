<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280">
  <defs>
    <!-- Professional Palette -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4361EE;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3A0CA3;stop-opacity:1"/>
    </linearGradient>
    
    <!-- Soft Glow for premium feel -->
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Subtle Background Mesh Gradient -->
    <radialGradient id="bgGlow" cx="80%" cy="20%" r="50%">
      <stop offset="0%" style="stop-color:#4361EE;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#4361EE;stop-opacity:0"/>
    </radialGradient>
  </defs>
  
  <!-- Main Background -->
  <rect width="600" height="280" fill="#12141D" rx="20"/>
  
  <!-- Subtle Ambient Glow -->
  <rect width="600" height="280" fill="url(#bgGlow)" rx="20"/>
  
  <!-- Elegant Border -->
  <rect width="600" height="280" fill="none" stroke="#4361EE" stroke-width="1.5" rx="20" opacity="0.2"/>
  
  <!-- Top Accent Line -->
  <rect x="20" y="20" width="560" height="2" rx="1" fill="url(#accentGradient)" opacity="0.6"/>
  
  <!-- Title -->
  <text x="300" y="55" text-anchor="middle" fill="#F8F9FA" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="600" letter-spacing="2" opacity="0">
    PROFILE ANALYTICS
    <animate attributeName="opacity" values="0;0.6" dur="0.8s" begin="0.2s" fill="freeze"/>
  </text>

  <!-- ========================================== -->
  <!-- COLUMN 1: RANK (Left)                      -->
  <!-- ========================================== -->
  <g transform="translate(100, 150)">
    <!-- Background Ring -->
    <circle cx="0" cy="0" r="55" fill="none" stroke="#1E2130" stroke-width="6"/>
    
    <!-- Animated Progress Ring -->
    <circle cx="0" cy="0" r="55" fill="none" stroke="url(#accentGradient)" stroke-width="6" stroke-linecap="round" stroke-dasharray="345" stroke-dashoffset="345" transform="rotate(-90)">
      <animate attributeName="stroke-dashoffset" from="345" to="0" dur="2s" begin="0.5s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    </circle>
    
    <!-- Rank Text -->
    <text x="0" y="12" text-anchor="middle" fill="#4361EE" font-family="system-ui, sans-serif" font-size="36" font-weight="800" opacity="0" filter="url(#softGlow)">
      S+
      <animate attributeName="opacity" values="0;1" dur="0.6s" begin="1.8s" fill="freeze"/>
    </text>
    <text x="0" y="35" text-anchor="middle" fill="#F8F9FA" font-family="system-ui, sans-serif" font-size="12" font-weight="500" opacity="0">
      Developer Rank
      <animate attributeName="opacity" values="0;0.6" dur="0.6s" begin="2s" fill="freeze"/>
    </text>
  </g>

  <!-- Vertical Divider 1 -->
  <line x1="200" y1="80" x2="200" y2="220" stroke="#4361EE" stroke-width="1" opacity="0.15"/>

  <!-- ========================================== -->
  <!-- COLUMN 2: REPOSITORIES                     -->
  <!-- ========================================== -->
  <g transform="translate(290, 150)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.6s" begin="0.8s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" values="290,160; 290,150" dur="0.6s" begin="0.8s" fill="freeze"/>
    
    <!-- Icon -->
    <g transform="translate(-12, -35)" fill="none" stroke="#4361EE" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 4h16v16H4z"/>
      <path d="M9 9h6"/>
      <path d="M9 13h6"/>
    </g>
    
    <!-- Value -->
    <text x="0" y="5" text-anchor="middle" fill="#F8F9FA" font-family="system-ui, sans-serif" font-size="32" font-weight="700">15</text>
    
    <!-- Label -->
    <text x="0" y="30" text-anchor="middle" fill="#F8F9FA" font-family="system-ui, sans-serif" font-size="12" font-weight="500" opacity="0.6">Repositories</text>
  </g>

  <!-- Vertical Divider 2 -->
  <line x1="380" y1="80" x2="380" y2="220" stroke="#4361EE" stroke-width="1" opacity="0.15"/>

  <!-- ========================================== -->
  <!-- COLUMN 3: FOLLOWERS                        -->
  <!-- ========================================== -->
  <g transform="translate(470, 150)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.6s" begin="1.0s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" values="470,160; 470,150" dur="0.6s" begin="1.0s" fill="freeze"/>
    
    <!-- Icon -->
    <g transform="translate(-12, -35)" fill="none" stroke="#4361EE" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
      <circle cx="9" cy="7" r="4"/>
      <path d="M22 21v-2a4 4 0 0 0-3-3.87"/>
      <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
    </g>
    
    <!-- Value -->
    <text x="0" y="5" text-anchor="middle" fill="#F8F9FA" font-family="system-ui, sans-serif" font-size="32" font-weight="700">250</text>
    
    <!-- Label -->
    <text x="0" y="30" text-anchor="middle" fill="#F8F9FA" font-family="system-ui, sans-serif" font-size="12" font-weight="500" opacity="0.6">Followers</text>
  </g>

  <!-- Vertical Divider 3 -->
  <line x1="560" y1="80" x2="560" y2="220" stroke="#4361EE" stroke-width="1" opacity="0.15"/>

  <!-- ========================================== -->
  <!-- COLUMN 4: COMMITS              -->
  <!-- ========================================== -->
  <g transform="translate(650, 150)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.6s" begin="1.2s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" values="650,160; 650,150" dur="0.6s" begin="1.2s" fill="freeze"/>
    
    <!-- Icon -->
    <g transform="translate(-12, -35)" fill="none" stroke="#4361EE" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="4"/>
      <line x1="12" y1="2" x2="12" y2="8"/>
      <line x1="12" y1="16" x2="12" y2="22"/>
    </g>
    
    <!-- Value -->
    <text x="0" y="5" text-anchor="middle" fill="#4361EE" font-family="system-ui, sans-serif" font-size="32" font-weight="800" filter="url(#softGlow)">500+</text>
    
    <!-- Label -->
    <text x="0" y="30" text-anchor="middle" fill="#F8F9FA" font-family="system-ui, sans-serif" font-size="12" font-weight="500" opacity="0.6">Total Commits</text>
  </g>

</svg>
