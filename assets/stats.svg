<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280">
  <defs>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4361EE;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3A0CA3;stop-opacity:1"/>
    </linearGradient>
  </defs>
  
  <!-- Main Background with subtle border -->
  <rect width="600" height="280" fill="#12141D" rx="16"/>
  <rect width="600" height="280" fill="none" stroke="#4361EE" stroke-width="1.5" stroke-opacity="0.3" rx="16"/>
  
  <!-- Top Accent Line -->
  <path d="M 16 0 L 584 0 Q 600 0 600 16 L 600 4 L 0 4 L 0 0 Z" fill="#4361EE"/>

  <!-- Title -->
  <text x="300" y="45" text-anchor="middle" fill="#F8F9FA" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" letter-spacing="2" opacity="0">
    PROFILE ANALYTICS
    <animate attributeName="opacity" to="0.7" dur="1s" begin="0.2s" fill="freeze"/>
  </text>

  <!-- ========================================== -->
  <!-- COLUMN 1: RANK                             -->
  <!-- ========================================== -->
  <g transform="translate(80, 150)">
    <!-- Background Ring -->
    <circle cx="0" cy="0" r="50" fill="none" stroke="#1E2130" stroke-width="6"/>
    
    <!-- Animated Progress Ring -->
    <circle cx="0" cy="0" r="50" fill="none" stroke="url(#accentGrad)" stroke-width="6" stroke-dasharray="314" stroke-dashoffset="314" transform="rotate(-90)">
      <animate attributeName="stroke-dashoffset" to="0" dur="2s" begin="0.5s" fill="freeze"/>
    </circle>
    
    <!-- Rank Text -->
    <text x="0" y="12" text-anchor="middle" fill="#4361EE" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="bold" opacity="0">
      S+
      <animate attributeName="opacity" to="1" dur="0.5s" begin="2s" fill="freeze"/>
    </text>
    <text x="0" y="35" text-anchor="middle" fill="#F8F9FA" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" opacity="0">
      Rank
      <animate attributeName="opacity" to="0.6" dur="0.5s" begin="2.2s" fill="freeze"/>
    </text>
  </g>

  <!-- Divider 1 -->
  <line x1="150" y1="80" x2="150" y2="220" stroke="#4361EE" stroke-width="1" stroke-opacity="0.2"/>

  <!-- ========================================== -->
  <!-- COLUMN 2: REPOSITORIES                     -->
  <!-- ========================================== -->
  <g transform="translate(220, 150)" opacity="0">
    <animate attributeName="opacity" to="1" dur="0.6s" begin="0.8s" fill="freeze"/>
    
    <!-- Simple Folder Icon -->
    <path d="M-12,-20 L-12,-26 L12,-26 L12,-20" fill="none" stroke="#4361EE" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="-14" y="-20" width="28" height="22" rx="3" fill="none" stroke="#4361EE" stroke-width="2.5"/>
    
    <!-- Value -->
    <text x="0" y="15" text-anchor="middle" fill="#F8F9FA" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="bold">15</text>
    
    <!-- Label -->
    <text x="0" y="38" text-anchor="middle" fill="#F8F9FA" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" opacity="0.6">Repositories</text>
  </g>

  <!-- Divider 2 -->
  <line x1="300" y1="80" x2="300" y2="220" stroke="#4361EE" stroke-width="1" stroke-opacity="0.2"/>

  <!-- ========================================== -->
  <!-- COLUMN 3: FOLLOWERS                        -->
  <!-- ========================================== -->
  <g transform="translate(380, 150)" opacity="0">
    <animate attributeName="opacity" to="1" dur="0.6s" begin="1.0s" fill="freeze"/>
    
    <!-- Simple User Icon -->
    <circle cx="0" cy="-18" r="9" fill="none" stroke="#4361EE" stroke-width="2.5"/>
    <path d="M-16,5 Q0,-8 16,5" fill="none" stroke="#4361EE" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Value -->
    <text x="0" y="15" text-anchor="middle" fill="#F8F9FA" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="bold">250</text>
    
    <!-- Label -->
    <text x="0" y="38" text-anchor="middle" fill="#F8F9FA" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" opacity="0.6">Followers</text>
  </g>

  <!-- Divider 3 -->
  <line x1="450" y1="80" x2="450" y2="220" stroke="#4361EE" stroke-width="1" stroke-opacity="0.2"/>

  <!-- ========================================== -->
  <!-- COLUMN 4: COMMITS                          -->
  <!-- ========================================== -->
  <g transform="translate(520, 150)" opacity="0">
    <animate attributeName="opacity" to="1" dur="0.6s" begin="1.2s" fill="freeze"/>
    
    <!-- Simple Commit Node Icon -->
    <line x1="0" y1="-28" x2="0" y2="28" stroke="#4361EE" stroke-width="2.5"/>
    <circle cx="0" cy="-10" r="7" fill="#12141D" stroke="#4361EE" stroke-width="2.5"/>
    <circle cx="0" cy="10" r="7" fill="#4361EE"/>
    
    <!-- Value (Changed to White) -->
    <text x="0" y="15" text-anchor="middle" fill="#F8F9FA" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="bold">500+</text>
    
    <!-- Label -->
    <text x="0" y="38" text-anchor="middle" fill="#F8F9FA" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" opacity="0.6">Total Commits</text>
  </g>

</svg>
