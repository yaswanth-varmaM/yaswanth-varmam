<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 200">
  <defs>
    <!-- Professional Palette -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4361EE;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3A0CA3;stop-opacity:1"/>
    </linearGradient>
    
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Clean Background -->
  <rect width="420" height="200" rx="16" fill="#12141D"/>
  
  <!-- Subtle Top Accent Line -->
  <rect x="0" y="0" width="420" height="3" rx="1.5" fill="url(#accentGradient)"/>
  
  <!-- Title -->
  <text x="210" y="35" text-anchor="middle" fill="#F8F9FA" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="600" letter-spacing="1" opacity="0">
    PROFILE STATISTICS
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.2s" fill="freeze"/>
  </text>
  
  <!-- LEFT SIDE: Rank Ring -->
  <g transform="translate(80, 110)">
    <!-- Background Ring -->
    <circle cx="0" cy="0" r="45" fill="none" stroke="#1E2130" stroke-width="6"/>
    
    <!-- Animated Progress Ring -->
    <circle cx="0" cy="0" r="45" fill="none" stroke="url(#accentGradient)" stroke-width="6" stroke-linecap="round" stroke-dasharray="283" stroke-dashoffset="283" transform="rotate(-90)">
      <animate attributeName="stroke-dashoffset" from="283" to="0" dur="1.5s" begin="0.5s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    </circle>
    
    <!-- Rank Text -->
    <text x="0" y="10" text-anchor="middle" fill="#4361EE" font-family="system-ui, sans-serif" font-size="28" font-weight="800" opacity="0">
      S+
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1.5s" fill="freeze"/>
    </text>
    <text x="0" y="30" text-anchor="middle" fill="#F8F9FA" font-family="system-ui, sans-serif" font-size="11" font-weight="500" opacity="0.5">
      Rank
      <animate attributeName="opacity" values="0;0.5" dur="0.5s" begin="1.7s" fill="freeze"/>
    </text>
  </g>
  
  <!-- RIGHT SIDE: 2x2 Grid -->
  
  <!-- 1. Repositories (Top Left) -->
  <g transform="translate(180, 75)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.6s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" values="180,85; 180,75" dur="0.5s" begin="0.6s" fill="freeze"/>
    
    <!-- Accent Dot -->
    <circle cx="0" cy="5" r="4" fill="#4361EE"/>
    
    <!-- Value -->
    <text x="15" y="10" fill="#F8F9FA" font-family="system-ui, sans-serif" font-size="26" font-weight="700">15</text>
    
    <!-- Label -->
    <text x="15" y="28" fill="#F8F9FA" font-family="system-ui, sans-serif" font-size="11" font-weight="500" opacity="0.5">Repositories</text>
  </g>
  
  <!-- 2. Followers (Top Right) -->
  <g transform="translate(310, 75)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.8s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" values="310,85; 310,75" dur="0.5s" begin="0.8s" fill="freeze"/>
    
    <circle cx="0" cy="5" r="4" fill="#4361EE"/>
    <text x="15" y="10" fill="#F8F9FA" font-family="system-ui, sans-serif" font-size="26" font-weight="700">250</text>
    <text x="15" y="28" fill="#F8F9FA" font-family="system-ui, sans-serif" font-size="11" font-weight="500" opacity="0.5">Followers</text>
  </g>
  
  <!-- 3. Following (Bottom Left) -->
  <g transform="translate(180, 135)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1.0s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" values="180,145; 180,135" dur="0.5s" begin="1.0s" fill="freeze"/>
    
    <circle cx="0" cy="5" r="4" fill="#4361EE"/>
    <text x="15" y="10" fill="#F8F9FA" font-family="system-ui, sans-serif" font-size="26" font-weight="700">50</text>
    <text x="15" y="28" fill="#F8F9FA" font-family="system-ui, sans-serif" font-size="11" font-weight="500" opacity="0.5">Following</text>
  </g>
  
  <!-- 4. Contributions (Bottom Right) -->
  <g transform="translate(310, 135)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1.2s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" values="310,145; 310,135" dur="0.5s" begin="1.2s" fill="freeze"/>
    
    <circle cx="0" cy="5" r="4" fill="#4361EE"/>
    <text x="15" y="10" fill="#F8F9FA" font-family="system-ui, sans-serif" font-size="26" font-weight="700">1.2k</text>
    <text x="15" y="28" fill="#F8F9FA" font-family="system-ui, sans-serif" font-size="11" font-weight="500" opacity="0.5">Contributions</text>
  </g>
  
</svg>
