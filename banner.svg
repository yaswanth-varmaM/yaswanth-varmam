<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 740" width="1280" height="740">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0b2e" />
      <stop offset="50%" stop-color="#2d1b4e" />
      <stop offset="100%" stop-color="#4a1a6e" />
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6b9d" />
      <stop offset="50%" stop-color="#c44569" />
      <stop offset="100%" stop-color="#a18cd1" />
    </linearGradient>
    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,107,157,0)" />
      <stop offset="50%" stop-color="rgba(255,107,157,0.8)" />
      <stop offset="100%" stop-color="rgba(255,107,157,0)" />
    </linearGradient>
    
    <!-- Filters -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur1" />
      <feGaussianBlur stdDeviation="6" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Clip Paths -->
    <clipPath id="bannerClip">
      <rect x="0" y="0" width="1280" height="740" rx="20" ry="20" />
    </clipPath>
    <clipPath id="charClip">
      <!-- Animated clip path for hologram reveal -->
      <rect x="850" y="100" width="350" height="0" rx="15" ry="15">
        <animate attributeName="height" values="0;500" dur="2s" fill="freeze" />
      </rect>
    </clipPath>

    <style>
      /* CSS Animations */
      @keyframes popIn {
        0% { opacity: 0; transform: translateY(20px) scale(0.8); }
        100% { opacity: 1; transform: translateY(0) scale(1); }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      @keyframes flicker {
        0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
        20%, 24%, 55% { opacity: 0.4; }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-15px); }
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 0.5; }
        50% { transform: scale(1.1); opacity: 0.8; }
      }
      @keyframes slideIn {
        0% { opacity: 0; transform: translateX(-20px); }
        100% { opacity: 1; transform: translateX(0); }
      }
      
      .letter { opacity: 0; animation: popIn 0.5s ease-out forwards; }
      .cursor { animation: blink 1s step-end infinite; }
      .neon { animation: flicker 3s infinite; }
      .float-1 { animation: float 4s ease-in-out infinite; }
      .float-2 { animation: float 5s ease-in-out infinite 1s; }
      .pulse-orb { animation: pulse 4s ease-in-out infinite; }
      .slide-in { opacity: 0; animation: slideIn 0.5s ease-out forwards; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1280" height="740" fill="url(#bgGrad)" clip-path="url(#bannerClip)" />

  <!-- Pulsing Ambient Orbs -->
  <circle cx="200" cy="600" r="150" fill="#ff6b9d" opacity="0.1" class="pulse-orb" filter="url(#glow)" />
  <circle cx="1100" cy="200" r="200" fill="#a18cd1" opacity="0.1" class="pulse-orb" style="animation-delay: 2s;" filter="url(#glow)" />

  <!-- Terminal -->
  <g transform="translate(50, 50)">
    <rect width="400" height="40" fill="#0d0d1a" rx="8" opacity="0.8" />
    <circle cx="20" cy="20" r="6" fill="#ff5f56" />
    <circle cx="40" cy="20" r="6" fill="#ffbd2e" />
    <circle cx="60" cy="20" r="6" fill="#27c93f" />
    <text x="80" y="26" fill="#00ff88" font-family="monospace" font-size="16" opacity="0">
      user@dev:~$ cat README.md
      <animate attributeName="opacity" values="0;1" dur="2s" fill="freeze" />
    </text>
    <rect x="280" y="12" width="10" height="16" fill="#00ff88" class="cursor" />
  </g>

  <!-- Character Image with Hologram Reveal -->
  <g clip-path="url(#charClip)">
    <!-- ⚠️ REPLACE THIS RECT WITH YOUR ACTUAL BASE64 IMAGE ⚠️ -->
    <!-- Example: <image href="data:image/png;base64,..." x="850" y="100" width="350" height="500" /> -->
    <rect x="850" y="100" width="350" height="500" fill="#2d1b4e" rx="15" />
    <text x="1025" y="350" fill="#ff6b9d" font-family="sans-serif" font-size="20" text-anchor="middle">[Your Character Image Here]</text>
  </g>
  <!-- Hologram Scan Line -->
  <rect x="850" y="100" width="350" height="4" fill="#00ff88" filter="url(#glow)" opacity="0">
    <animate attributeName="y" values="100;600" dur="2s" fill="freeze" />
    <animate attributeName="opacity" values="1;0" dur="2s" fill="freeze" />
  </rect>

  <!-- Name with Pop-in Letters -->
  <g transform="translate(640, 200)">
    <text text-anchor="middle" font-family="'Brush Script MT', cursive" font-size="72" fill="url(#nameGrad)" filter="url(#glow)">
      <tspan class="letter" style="animation-delay: 0.5s;">M</tspan>
      <tspan class="letter" style="animation-delay: 0.6s;">a</tspan>
      <tspan class="letter" style="animation-delay: 0.7s;">l</tspan>
      <tspan class="letter" style="animation-delay: 0.8s;">a</tspan>
      <tspan class="letter" style="animation-delay: 0.9s;">r</tspan>
      <tspan class="letter" style="animation-delay: 1.0s;">a</tspan>
      <tspan class="letter" style="animation-delay: 1.1s;">j</tspan>
      <tspan class="letter" style="animation-delay: 1.2s;">u</tspan>
      <tspan class="letter" style="animation-delay: 1.4s;"> </tspan>
      <tspan class="letter" style="animation-delay: 1.5s;">Y</tspan>
      <tspan class="letter" style="animation-delay: 1.6s;">a</tspan>
      <tspan class="letter" style="animation-delay: 1.7s;">s</tspan>
      <tspan class="letter" style="animation-delay: 1.8s;">w</tspan>
      <tspan class="letter" style="animation-delay: 1.9s;">a</tspan>
      <tspan class="letter" style="animation-delay: 2.0s;">n</tspan>
      <tspan class="letter" style="animation-delay: 2.1s;">t</tspan>
      <tspan class="letter" style="animation-delay: 2.2s;">h</tspan>
      <tspan class="letter" style="animation-delay: 2.4s;"> </tspan>
      <tspan class="letter" style="animation-delay: 2.5s;">V</tspan>
      <tspan class="letter" style="animation-delay: 2.6s;">a</tspan>
      <tspan class="letter" style="animation-delay: 2.7s;">r</tspan>
      <tspan class="letter" style="animation-delay: 2.8s;">m</tspan>
      <tspan class="letter" style="animation-delay: 2.9s;">a</tspan>
    </text>
  </g>

  <!-- Cycling Role Titles -->
  <g transform="translate(640, 260)">
    <text text-anchor="middle" font-family="monospace" font-size="24" fill="#00ff88" opacity="0">
      <tspan>Data Analyst</tspan>
      <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.1;0.8;0.9;1" dur="6s" repeatCount="indefinite" />
    </text>
    <text text-anchor="middle" font-family="monospace" font-size="24" fill="#ff6b9d" opacity="0">
      <tspan>Python Developer</tspan>
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.16;0.26;0.8;0.9;1" dur="6s" repeatCount="indefinite" />
    </text>
    <text text-anchor="middle" font-family="monospace" font-size="24" fill="#a18cd1" opacity="0">
      <tspan>SQL Expert</tspan>
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.33;0.43;0.8;0.9;1" dur="6s" repeatCount="indefinite" />
    </text>
  </g>

  <!-- Quote Box -->
  <g transform="translate(640, 320)">
    <rect x="-250" y="-30" width="500" height="60" fill="#0d0d1a" stroke="#ff6b9d" stroke-width="2" rx="10" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="3s" fill="freeze" />
    </rect>
    <text x="0" y="5" text-anchor="middle" font-family="monospace" font-size="20" fill="#ffffff" opacity="0">
      "Zero dependencies.
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="3.5s" fill="freeze" />
    </text>
    <text x="0" y="30" text-anchor="middle" font-family="monospace" font-size="20" fill="#ffffff" opacity="0">
      Zero regrets."
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="4s" fill="freeze" />
    </text>
  </g>

  <!-- Tech Stack Pills -->
  <g transform="translate(100, 420)">
    <rect x="0" y="0" width="80" height="30" fill="#3776ab" rx="15" class="slide-in" style="animation-delay: 4.5s;" />
    <text x="40" y="20" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="14" class="slide-in" style="animation-delay: 4.5s;">Python</text>
    
    <rect x="100" y="0" width="60" height="30" fill="#00758f" rx="15" class="slide-in" style="animation-delay: 4.7s;" />
    <text x="130" y="20" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="14" class="slide-in" style="animation-delay: 4.7s;">SQL</text>

    <rect x="180" y="0" width="90" height="30" fill="#f2c811" rx="15" class="slide-in" style="animation-delay: 4.9s;" />
    <text x="225" y="20" text-anchor="middle" fill="#000" font-family="sans-serif" font-size="14" class="slide-in" style="animation-delay: 4.9s;">PowerBI</text>

    <rect x="290" y="0" width="90" height="30" fill="#e97627" rx="15" class="slide-in" style="animation-delay: 5.1s;" />
    <text x="335" y="20" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="14" class="slide-in" style="animation-delay: 5.1s;">Tableau</text>
  </g>

  <!-- Code Editor Card -->
  <g transform="translate(50, 500)">
    <rect width="350" height="180" fill="#0d0d1a" stroke="#a18cd1" stroke-width="1" rx="10" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="5.5s" fill="freeze" />
    </rect>
    <text x="20" y="30" fill="#ff6b9d" font-family="monospace" font-size="14" opacity="0">
      const buildDreams = () => {
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="5.7s" fill="freeze" />
    </text>
    <text x="40" y="55" fill="#00ff88" font-family="monospace" font-size="14" opacity="0">
      &nbsp;&nbsp;const skills = ['Data', 'Code'];
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="6.0s" fill="freeze" />
    </text>
    <text x="40" y="80" fill="#a18cd1" font-family="monospace" font-size="14" opacity="0">
      &nbsp;&nbsp;return skills.map(insight);
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="6.3s" fill="freeze" />
    </text>
    <text x="20" y="105" fill="#ff6b9d" font-family="monospace" font-size="14" opacity="0">
      };
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="6.6s" fill="freeze" />
    </text>
  </g>

  <!-- Neon Sign -->
  <g transform="translate(640, 650)">
    <text text-anchor="middle" font-family="monospace" font-size="32" fill="#ff6b9d" filter="url(#neonGlow)" class="neon" opacity="0">
      KEEP CODING KEEP GROWING
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="7s" fill="freeze" />
    </text>
  </g>

  <!-- Floating Hearts & Sparkles -->
  <text x="150" y="150" font-size="24" class="float-1">❤️</text>
  <text x="1150" y="300" font-size="20" class="float-2">✨</text>
  <circle cx="100" cy="500" r="3" fill="#fff" class="pulse-orb" />
  <circle cx="1200" cy="600" r="4" fill="#ff6b9d" class="pulse-orb" style="animation-delay: 1s;" />

  <!-- Continuous Full-Width Horizontal Scanner -->
  <rect x="0" y="0" width="1280" height="20" fill="url(#scanGrad)" opacity="0.5" clip-path="url(#bannerClip)">
    <animate attributeName="y" values="-20;740" dur="3.5s" repeatCount="indefinite" />
  </rect>
</svg>
